<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IFC MVP Starter | PM Prototype OS</title>
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", sans-serif; }
      #app { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 56px 1fr; height: 100%; }
      header { grid-column: 1 / 3; display: flex; align-items: center; gap: 16px; padding: 0 16px; background: #12213a; color: #fff; }
      header h1 { font-size: 15px; font-weight: 600; margin: 0; }
      header .sub { font-size: 12px; color: #9fb0cc; }
      #viewer-container { position: relative; background: #eef1f5; }
      #drop-hint {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 8px; color: #566; pointer-events: none; font-size: 14px;
      }
      #sidebar { border-left: 1px solid #dde3ec; overflow-y: auto; background: #fff; }
      .panel { padding: 14px 16px; border-bottom: 1px solid #eef1f5; }
      .panel h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #7a869a; margin: 0 0 8px; }
      #status { font-size: 13px; color: #333; }
      #element-list { list-style: none; margin: 0; padding: 0; font-size: 13px; }
      #element-list li { padding: 6px 8px; border-radius: 6px; cursor: pointer; display: flex; justify-content: space-between; }
      #element-list li:hover { background: #f2f5fa; }
      #element-list .count { color: #8a93a6; }
      #props table { width: 100%; border-collapse: collapse; font-size: 12px; }
      #props td { padding: 3px 4px; vertical-align: top; border-bottom: 1px solid #f2f2f2; word-break: break-all; }
      #props td:first-child { color: #7a869a; width: 40%; }
      input[type="file"] { display: none; }
      .file-btn {
        background: #2f6fed; color: #fff; border: none; padding: 6px 14px; border-radius: 6px;
        font-size: 12px; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1>IFC MVP Starter</h1>
        <span class="sub">PM Prototype OS / cards/ifc_analysis.md の実装基盤</span>
        <label class="file-btn" for="file-input">IFCファイルを開く</label>
        <input id="file-input" type="file" accept=".ifc,.ifcXML,.ifcZIP" />
      </header>
      <div id="viewer-container">
        <div id="drop-hint">
          <div>IFCファイルをここにドラッグ&ドロップ</div>
          <div style="font-size:12px;color:#889">またはヘッダーの「IFCファイルを開く」から選択</div>
        </div>
      </div>
      <div id="sidebar">
        <div class="panel">
          <h2>ステータス</h2>
          <div id="status">ファイル未読み込み</div>
        </div>
        <div class="panel">
          <h2>部材一覧（クリックで属性表示）</h2>
          <ul id="element-list"></ul>
        </div>
        <div class="panel">
          <h2>選択中の属性</h2>
          <div id="props">部材をクリックすると属性が表示されます</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
